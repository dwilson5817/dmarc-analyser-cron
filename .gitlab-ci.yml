stages:
  - build

build:
  stage: build
  image: python:3.13
  cache:
    key:
      files:
        - "*/requirements.txt"
    paths:
      - .pip-cache/
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  script:
    - apt-get update && apt-get install -y zip
    - |
      for dir in */; do
        if [ -f "${dir}requirements.txt" ]; then
          echo "Building ${dir%/}..."
          pip install -r "${dir}requirements.txt" -t "${dir}package/"
          cp "${dir}main.py" "${dir}package/"
          (cd "${dir}package" && zip -r "../function.zip" .)
        fi
      done
  artifacts:
    paths:
      - "*/function.zip"
